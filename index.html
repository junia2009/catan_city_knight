<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>カタン (Phase 1)</title>
<style>
  :root {
    --bg: #0e1621;
    --panel: #1a2634;
    --panel2: #223245;
    --text: #e8e6e0;
    --dim: #9aa8b5;
    --accent: #f2b03d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 12px; background: var(--panel);
    border-bottom: 1px solid #000;
    flex-wrap: wrap;
  }
  #topbar h1 { font-size: 15px; color: var(--accent); margin-right: auto; }
  #topbar label { font-size: 12px; color: var(--dim); }
  #topbar input, #topbar select {
    background: var(--panel2); color: var(--text);
    border: 1px solid #34495e; border-radius: 4px; padding: 3px 6px; font-size: 12px;
  }
  #topbar input { width: 90px; }

  #main {
    flex: 1; display: flex; min-height: 0;
  }
  #board-wrap { flex: 1; min-width: 0; position: relative; }
  #board { width: 100%; height: 100%; display: block; cursor: pointer; }

  #side {
    width: 290px; display: flex; flex-direction: column;
    background: var(--panel); border-left: 1px solid #000; min-height: 0;
  }
  #players { padding: 8px; display: flex; flex-direction: column; gap: 6px; }
  .player {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    background: var(--panel2); border-radius: 6px; padding: 6px 8px;
    border: 2px solid transparent; font-size: 12.5px;
  }
  .player.active { border-color: var(--accent); }
  .chip { width: 12px; height: 12px; border-radius: 50%; display: inline-block; border: 1px solid #000; }
  .pname { font-weight: 700; }
  .ppts { color: var(--accent); font-weight: 700; }
  .pinfo { color: var(--dim); font-size: 11px; }
  .badge {
    background: var(--accent); color: #222; border-radius: 3px;
    font-size: 10px; padding: 1px 4px; font-weight: 700;
  }

  #dice { padding: 4px 10px; display: flex; gap: 6px; align-items: center; }
  .die {
    width: 28px; height: 28px; background: #f5efdf; color: #222;
    border-radius: 5px; display: inline-flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 16px;
  }
  .dsum { color: var(--dim); font-size: 13px; }

  #log {
    flex: 1; overflow-y: auto; font-size: 11.5px; color: var(--dim);
    padding: 8px 10px; border-top: 1px solid #0006; line-height: 1.6;
  }
  #log div:last-child { color: var(--text); }

  #bottom {
    background: var(--panel); border-top: 1px solid #000;
    padding: 6px 10px; display: flex; flex-direction: column; gap: 6px;
  }
  #status { display: flex; align-items: center; gap: 8px; min-height: 30px; font-size: 13px; }
  #status .msg { color: var(--accent); }

  #hand { display: flex; gap: 6px; align-items: stretch; flex-wrap: wrap; }
  .card {
    min-width: 52px; padding: 5px 6px; border-radius: 6px; text-align: center;
    font-size: 12px; color: #1b1b1b; border: 1px solid #0007;
    display: flex; flex-direction: column; justify-content: center; gap: 2px;
  }
  .card .cnt { font-size: 16px; font-weight: 800; }
  .card-wood { background: #7fb069; }
  .card-brick { background: #d08c60; }
  .card-sheep { background: #cde77f; }
  .card-wheat { background: #ffd97d; }
  .card-ore { background: #aeb8c2; }
  .card.dev { background: #c9b6e4; cursor: pointer; font-weight: 700; }
  .card.dev.dim { opacity: 0.5; cursor: default; }
  .sep { width: 1px; background: #0008; margin: 2px 4px; }

  #controls { display: flex; gap: 6px; flex-wrap: wrap; }
  button {
    background: var(--panel2); color: var(--text);
    border: 1px solid #3a5068; border-radius: 6px;
    padding: 7px 12px; font-size: 13px; cursor: pointer;
    font-family: inherit;
  }
  button:hover:not(:disabled) { background: #2c4258; }
  button:disabled { opacity: 0.4; cursor: default; }
  button.primary { background: var(--accent); color: #222; font-weight: 700; border-color: #0007; }
  button.primary:hover:not(:disabled) { background: #ffc55e; }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center; z-index: 10;
  }
  .dialog {
    background: var(--panel); border: 1px solid #3a5068; border-radius: 10px;
    padding: 18px; min-width: 320px; max-width: 92vw;
    display: flex; flex-direction: column; gap: 10px;
  }
  .dialog h3 { font-size: 15px; color: var(--accent); }
  .dialog p { font-size: 12px; color: var(--dim); }
  .row { display: flex; gap: 6px; flex-wrap: wrap; }
  .row.end { justify-content: flex-end; margin-top: 4px; }
  .pick { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 62px; }
  .pick small { color: var(--dim); font-size: 10px; }
  .pick.sel { border-color: var(--accent); background: #3a4b2e; }
  .drow { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .drow span { flex: 1; }
  .drow b { width: 20px; text-align: center; }

  .res { font-size: 11px; }

  /* 縦画面: サイドを下に */
  @media (max-aspect-ratio: 1/1) {
    #main { flex-direction: column; }
    #side { width: 100%; height: 200px; flex-direction: row; border-left: none; border-top: 1px solid #000; }
    #players { flex: 1; overflow-y: auto; }
    #log { border-top: none; border-left: 1px solid #0006; }
    #dice { position: absolute; left: 10px; top: 44px; }
  }
</style>
</head>
<body>
  <div id="topbar">
    <h1>カタン — Phase 1</h1>
    <label>CPU数
      <select id="cpu-count">
        <option value="2">2体</option>
        <option value="3" selected>3体</option>
      </select>
    </label>
    <label>シード <input id="seed" placeholder="ランダム"></label>
    <button data-act="new-game">新しいゲーム</button>
  </div>
  <div id="main">
    <div id="board-wrap"><canvas id="board"></canvas></div>
    <div id="side">
      <div id="players"></div>
      <div id="dice"></div>
      <div id="log"></div>
    </div>
  </div>
  <div id="bottom">
    <div id="status"></div>
    <div id="hand"></div>
    <div id="controls"></div>
  </div>
  <div id="dialog-root"></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
